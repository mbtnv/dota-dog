name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main

env:
  PYTHON_VERSION: "3.13"

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen --dev

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Run linter
        run: uv run ruff check .

      - name: Run type checks
        run: uv run ty check

      - name: Run test suite
        run: uv run pytest

  deploy:
    name: Deploy to production
    runs-on:
      - self-hosted
      - linux
      - prod
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    permissions:
      contents: read
    env:
      DEPLOY_SETTINGS_FILE: /opt/dota-dog/deploy.env

    steps:
      - name: Load deploy settings
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f "${DEPLOY_SETTINGS_FILE}" ]]; then
            echo "Deploy settings file not found: ${DEPLOY_SETTINGS_FILE}" >&2
            exit 1
          fi
          source "${DEPLOY_SETTINGS_FILE}"
          : "${DEPLOY_DIR:?DEPLOY_DIR must be set in ${DEPLOY_SETTINGS_FILE}}"
          deploy_branch="${DEPLOY_BRANCH:-main}"
          compose_file="${DEPLOY_COMPOSE_FILE:-docker-compose.yml}"
          echo "DEPLOY_DIR=${DEPLOY_DIR}" >> "$GITHUB_ENV"
          echo "DEPLOY_BRANCH=${deploy_branch}" >> "$GITHUB_ENV"
          echo "DEPLOY_COMPOSE_FILE=${compose_file}" >> "$GITHUB_ENV"

      - name: Validate server checkout
        shell: bash
        run: |
          set -euo pipefail
          test -d "${DEPLOY_DIR}"
          test -d "${DEPLOY_DIR}/.git"
          test -f "${DEPLOY_DIR}/${DEPLOY_COMPOSE_FILE}"

      - name: Refuse dirty working tree
        shell: bash
        run: |
          set -euo pipefail
          if ! git -C "${DEPLOY_DIR}" diff --quiet || ! git -C "${DEPLOY_DIR}" diff --cached --quiet; then
            echo "Server checkout has uncommitted changes. Refusing to deploy." >&2
            git -C "${DEPLOY_DIR}" status --short
            exit 1
          fi

      - name: Update repository
        run: git -C "${DEPLOY_DIR}" pull --ff-only origin "${DEPLOY_BRANCH}"

      - name: Rebuild and restart services
        run: docker compose --project-directory "${DEPLOY_DIR}" -f "${DEPLOY_DIR}/${DEPLOY_COMPOSE_FILE}" up -d --build

      - name: Show service status
        run: docker compose --project-directory "${DEPLOY_DIR}" -f "${DEPLOY_DIR}/${DEPLOY_COMPOSE_FILE}" ps
